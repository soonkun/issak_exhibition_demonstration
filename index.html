<script>
  // fit the 575×1020 exhibition frame to any viewport
  function fit(){
    const stage = document.querySelector('.stage');
    if(!stage) return;
    const pad = 36;
    const s = Math.min((window.innerWidth - pad)/575, (window.innerHeight - pad)/1020, 1.25);
    stage.style.transform = 'scale('+s+')';
    stage.style.transformOrigin = 'center center';
  }
  window.addEventListener('resize', fit);
  const obs = setInterval(()=>{ if(document.querySelector('.stage')){ fit(); clearInterval(obs);} }, 80);
</script>
